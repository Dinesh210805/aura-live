services:
  - type: web
    name: aura-live-backend
    runtime: python
    plan: starter
    repo: https://github.com/Dinesh210805/aura-live.git
    branch: render-deploy
    autoDeploy: true
    rootDir: .
    buildCommand: pip install -r "requirements copy.txt"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --ws websockets --workers 1 --timeout-keep-alive 600
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RELOAD
        value: "False"
      - key: LOG_LEVEL
        value: INFO
      - key: DEFAULT_VLM_PROVIDER
        value: gemini
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: GOOGLE_CLOUD_REGION
        value: us-central1
      - key: GCS_LOGS_BUCKET
        sync: false
      - key: GCS_LOGS_ENABLED
        value: "false"
      - key: GEMINI_LIVE_ENABLED
        value: "true"
