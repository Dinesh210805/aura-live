<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA · Gemini Live Test</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg0: #0a0a0a;
      --bg1: #141414;
      --bg2: #1e1e1e;
      --bg3: #282828;
      --accent: #4f8ef7;
      --accent-dim: #2a4d8f;
      --green: #3ecf72;
      --red: #f75555;
      --yellow: #f7b955;
      --text: #e2e2e2;
      --text-dim: #888;
      --border: #2e2e2e;
      --user-bubble: #1a3a6e;
      --ai-bubble: #1e2420;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg0);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); flex-shrink: 0;
      transition: background 0.3s;
      box-shadow: 0 0 0 2px transparent;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-label { font-size: 12px; color: var(--text-dim); }
    header .spacer { flex: 1; }
    .badge {
      padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
      background: var(--bg3); color: var(--text-dim);
    }
    .badge.live { background: #1a3a1a; color: var(--green); }

    /* ── Layout ──────────────────────────────────────────────── */
    .layout {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ── Chat pane ───────────────────────────────────────────── */
    .chat-pane {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

    .bubble-row {
      display: flex; flex-direction: column; gap: 2px;
      animation: fadein 0.15s ease;
    }
    @keyframes fadein { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: none; } }
    .bubble-row.user { align-items: flex-end; }
    .bubble-row.ai   { align-items: flex-start; }

    .bubble-label {
      font-size: 10px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.06em; padding: 0 4px;
    }
    .bubble-row.user .bubble-label { color: #5a8af0; }
    .bubble-row.ai  .bubble-label { color: var(--green); }

    .bubble {
      max-width: 70%; padding: 10px 14px; border-radius: var(--radius);
      line-height: 1.55; white-space: pre-wrap; word-break: break-word;
      font-size: 13.5px;
    }
    .bubble-row.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 3px;
    }
    .bubble-row.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }
    .bubble.streaming::after {
      content: '▋';
      display: inline-block;
      animation: blink 0.8s step-end infinite;
      margin-left: 2px;
      color: var(--accent);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .bubble-time { font-size: 10px; color: var(--text-dim); padding: 0 4px; }

    /* text input bar */
    .chat-input-bar {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
      flex-shrink: 0;
    }
    .chat-input-bar input {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 8px 12px;
      font-size: 13px; outline: none;
    }
    .chat-input-bar input:focus { border-color: var(--accent); }
    .chat-input-bar input::placeholder { color: var(--text-dim); }
    .btn {
      padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6b9ff8; }
    .btn-primary:disabled { background: var(--bg3); color: var(--text-dim); cursor: default; }
    .btn-danger  { background: var(--red); color: #fff; }
    .btn-danger:hover  { background: #f87777; }
    .btn-success { background: var(--green); color: #000; }
    .btn-success:hover { background: #5de68a; }
    .btn-ghost {
      background: var(--bg2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg3); }
    .btn-ghost.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── Right pane ──────────────────────────────────────────── */
    .right-pane {
      width: 340px; flex-shrink: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .panel {
      border-bottom: 1px solid var(--border); padding: 12px 14px;
      flex-shrink: 0;
    }
    .panel h3 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-dim); font-weight: 600; margin-bottom: 10px;
    }

    /* connection panel */
    .conn-row { display: flex; gap: 8px; align-items: center; }
    .conn-row label { font-size: 12px; color: var(--text-dim); min-width: 46px; }
    .conn-row input, .conn-row select {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 5px 8px;
      font-size: 12px; outline: none;
    }
    .conn-row input:focus, .conn-row select:focus { border-color: var(--accent); }
    .conn-buttons { display: flex; gap: 6px; margin-top: 8px; }
    .conn-buttons .btn { flex: 1; font-size: 12px; padding: 6px 10px; }

    /* audio panel */
    .audio-controls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .audio-controls .btn { font-size: 12px; padding: 5px 10px; }
    .level-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .level-label { font-size: 11px; color: var(--text-dim); min-width: 44px; }
    .level-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .level-fill { height: 100%; background: var(--green); border-radius: 3px; width: 0%; transition: width 0.05s; }
    .level-fill.output { background: var(--accent); }
    canvas#waveform {
      width: 100%; height: 60px;
      background: var(--bg2); border-radius: 6px; margin-top: 4px;
    }

    /* metrics panel */
    .metrics-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .metric-card {
      background: var(--bg2); border-radius: 8px; padding: 8px 10px;
    }
    .metric-card .val {
      font-size: 20px; font-weight: 700; color: var(--accent);
      line-height: 1.2;
    }
    .metric-card .lbl { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
    .task-status {
      margin-top: 8px; padding: 6px 10px; border-radius: 6px;
      background: var(--bg2); font-size: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .task-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
    .task-dot.executing { background: var(--yellow); animation: pulse 0.8s infinite; }
    .task-dot.idle { background: var(--text-dim); }

    /* interrupt banner */
    #interrupt-banner {
      display: none; background: var(--red); color: #fff;
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      text-align: center;
    }
    #interrupt-banner.show { display: block; animation: fadein 0.15s; }

    /* debug log */
    .debug-pane {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .debug-pane h3 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-dim); font-weight: 600;
      padding: 10px 14px 6px;
    }
    .debug-log {
      flex: 1; overflow-y: auto; padding: 0 14px 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10.5px; line-height: 1.6;
    }
    .debug-log::-webkit-scrollbar { width: 3px; }
    .debug-log::-webkit-scrollbar-thumb { background: var(--bg3); }
    .log-line { color: var(--text-dim); border-bottom: 1px solid var(--bg2); padding: 1px 0; }
    .log-line.send   { color: #7ec8f7; }
    .log-line.recv   { color: #a0d8a0; }
    .log-line.err    { color: var(--red); }
    .log-line.info   { color: var(--yellow); }
    .log-line .ts    { color: var(--bg3); margin-right: 4px; }
    .log-clear {
      font-size: 10px; padding: 2px 8px; float: right; margin-top: -4px;
      background: var(--bg3); border: none; color: var(--text-dim);
      border-radius: 4px; cursor: pointer;
    }
    .log-clear:hover { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="status-dot" id="dot"></div>
  <h1>AURA · Gemini Live</h1>
  <span class="status-label" id="status-label">Disconnected</span>
  <div class="spacer"></div>
  <span class="badge" id="model-badge">—</span>
  <span class="badge live" id="live-badge" style="display:none">● LIVE</span>
</header>

<div id="interrupt-banner">⚡ Barge-in detected — stopping playback</div>

<div class="layout">

  <!-- ── Chat ─────────────────────────────────────────────── -->
  <div class="chat-pane">
    <div class="chat-messages" id="chat"></div>
    <div class="chat-input-bar">
      <input type="text" id="text-input" placeholder="Type a command…" disabled />
      <button class="btn btn-primary" id="send-btn" disabled>Send</button>
    </div>
  </div>

  <!-- ── Right sidebar ─────────────────────────────────────── -->
  <div class="right-pane">

    <!-- Connection -->
    <div class="panel">
      <h3>Connection</h3>
      <div class="conn-row" style="margin-bottom:6px">
        <label>Server</label>
        <input id="server-url" value="ws://localhost:8000/ws/live" />
      </div>
      <div class="conn-row">
        <label>Session</label>
        <input id="session-id" value="browser-test-01" />
      </div>
      <div class="conn-row" style="margin-top:6px">
        <label>Voice</label>
        <select id="voice-select">
          <option value="Charon">Charon (male, deep)</option>
          <option value="Fenrir">Fenrir (male, expressive)</option>
          <option value="Puck">Puck (male, upbeat)</option>
          <option value="Aoede">Aoede (female, bright)</option>
          <option value="Kore">Kore (female, firm)</option>
          <option value="Schedar">Schedar (female, even)</option>
          <option value="Gacrux">Gacrux (male, mature)</option>
          <option value="Pulcherrima">Pulcherrima (female, forward)</option>
          <option value="Achird">Achird (male, casual)</option>
          <option value="Zubenelgenubi">Zubenelgenubi (male, casual)</option>
        </select>
      </div>
      <div class="conn-buttons">
        <button class="btn btn-success" id="connect-btn">Connect</button>
        <button class="btn btn-danger" id="disconnect-btn" disabled>Disconnect</button>
        <button class="btn btn-ghost" id="clear-chat-btn" title="Clear chat">🗑</button>
      </div>
    </div>

    <!-- Audio -->
    <div class="panel">
      <h3>Audio</h3>
      <div class="audio-controls">
        <button class="btn btn-ghost" id="mic-btn">🎤 Mic: OFF</button>
        <button class="btn btn-ghost" id="mute-out-btn">🔊 Output: ON</button>
        <button class="btn btn-ghost" id="cam-btn">📷 Camera: OFF</button>
      </div>
      <div class="level-row">
        <span class="level-label">Input</span>
        <div class="level-bar"><div class="level-fill" id="in-level"></div></div>
      </div>
      <div class="level-row">
        <span class="level-label">Output</span>
        <div class="level-bar"><div class="level-fill output" id="out-level"></div></div>
      </div>
      <canvas id="waveform" width="300" height="60"></canvas>
    </div>

    <!-- Metrics -->
    <div class="panel">
      <h3>Metrics</h3>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="val" id="m-latency">—</div>
          <div class="lbl">First-audio latency (s)</div>
        </div>
        <div class="metric-card">
          <div class="val" id="m-chunks-sent">0</div>
          <div class="lbl">Audio chunks sent</div>
        </div>
        <div class="metric-card">
          <div class="val" id="m-chunks-recv">0</div>
          <div class="lbl">Audio chunks received</div>
        </div>
        <div class="metric-card">
          <div class="val" id="m-interrupts">0</div>
          <div class="lbl">Barge-ins</div>
        </div>
      </div>
      <div class="task-status">
        <div class="task-dot idle" id="task-dot"></div>
        <span id="task-label">Idle</span>
      </div>
    </div>

    <!-- Debug log -->
    <div class="debug-pane">
      <h3>Debug Log <button class="log-clear" id="log-clear-btn">clear</button></h3>
      <div class="debug-log" id="debug-log"></div>
    </div>

  </div><!-- /right-pane -->
</div><!-- /layout -->

<!-- Hidden camera video element for screenshot capture -->
<video id="cam-video" autoplay playsinline muted style="display:none"></video>
<canvas id="cam-canvas" style="display:none"></canvas>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let ws = null;
let audioCtx = null;
let micStream = null;
let micProcessor = null;
let micSource = null;
let camStream = null;
let camTimer = null;
let outputMuted = false;

// playback queue
let nextPlayTime = 0;
let activeSources = [];

// transcript streaming state
let userStreamingRow = null;   // {row, bubble} DOM refs
let aiStreamingRow   = null;

// metrics
let chunksSent = 0;
let chunksRecv = 0;
let interrupts = 0;
let turnStartTime = null; // when the user started speaking
let firstAudioTime = null; // when we got first audio_response chunk

// ── Utility ────────────────────────────────────────────────────────────────
function ts() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}.${String(d.getMilliseconds()).padStart(3,'0')}`;
}

function log(msg, cls='') {
  const el = document.getElementById('debug-log');
  const line = document.createElement('div');
  line.className = `log-line ${cls}`;
  line.innerHTML = `<span class="ts">${ts()}</span>${escHtml(msg)}`;
  el.appendChild(line);
  // keep last 300 lines
  while (el.children.length > 300) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(label, dotClass) {
  document.getElementById('status-label').textContent = label;
  const dot = document.getElementById('dot');
  dot.className = 'status-dot ' + dotClass;
}

function updateMetrics() {
  document.getElementById('m-chunks-sent').textContent = chunksSent;
  document.getElementById('m-chunks-recv').textContent = chunksRecv;
  document.getElementById('m-interrupts').textContent  = interrupts;
}

// ── Audio Context (lazy init) ─────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    try {
      audioCtx = new AudioContext({ sampleRate: 16000 });
    } catch {
      audioCtx = new AudioContext();
    }
    log(`AudioContext created @ ${audioCtx.sampleRate}Hz`, 'info');
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connect() {
  const url = document.getElementById('server-url').value.trim();
  const sid = document.getElementById('session-id').value.trim() || 'browser-test';
  const voice = document.getElementById('voice-select').value;
  const fullUrl = `${url}?session_id=${sid}&voice=${voice}`;

  setStatus('Connecting…', 'connecting');
  log(`→ Connecting to ${fullUrl}`, 'info');

  ws = new WebSocket(fullUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('Connected', 'connected');
    document.getElementById('live-badge').style.display = '';
    document.getElementById('connect-btn').disabled = true;
    document.getElementById('disconnect-btn').disabled = false;
    document.getElementById('text-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('model-badge').textContent =
      new URL(fullUrl).searchParams.get('session_id') || sid;
    log('✓ WebSocket connected', 'info');
    chunksSent = chunksRecv = interrupts = 0;
    updateMetrics();
    // start ping interval
    pingTimer = setInterval(sendPing, 25000);
  };

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch { log(`Unparseable: ${evt.data}`, 'err'); return; }
    handleServerMessage(msg);
  };

  ws.onerror = (e) => {
    log(`WebSocket error: ${e.message || 'unknown'}`, 'err');
  };

  ws.onclose = (e) => {
    setStatus(`Disconnected (${e.code})`, '');
    document.getElementById('live-badge').style.display = 'none';
    document.getElementById('connect-btn').disabled = false;
    document.getElementById('disconnect-btn').disabled = true;
    document.getElementById('text-input').disabled = true;
    document.getElementById('send-btn').disabled = true;
    log(`✗ Disconnected — code=${e.code} reason="${e.reason}"`, 'err');
    clearInterval(pingTimer);
    stopMic();
    ws = null;
  };
}

let pingTimer = null;
function sendPing() {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: 'ping' }));
}

function disconnect() {
  if (ws) { ws.close(1000, 'user disconnect'); ws = null; }
}

function send(obj) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const txt = JSON.stringify(obj);
  ws.send(txt);
  if (obj.type !== 'audio_chunk') {
    log(`→ ${obj.type} ${obj.text ? '"'+obj.text.slice(0,40)+'"' : ''}`, 'send');
  }
}

// ── Server message handler ────────────────────────────────────────────────
function handleServerMessage(msg) {
  switch (msg.type) {
    case 'audio_response':
      handleAudioResponse(msg.data);
      break;
    case 'transcript': {
      handleTranscript(msg);
      // Show is_final clearly so we can verify the server accumulation fix
      const finalTag = msg.is_final === false ? '⬡partial' : '⬟FINAL';
      const who = msg.is_user ? 'user' : 'ai';
      log(`← transcript [${who}] ${finalTag} "${(msg.text||'').slice(0,70)}"`, 'recv');
      break;
    }
    case 'task_progress':
      handleTaskProgress(msg.status);
      log(`← task_progress status=${msg.status}`, 'recv');
      break;
    case 'interrupted':
      handleInterrupted();
      log(`← interrupted (barge-in)`, 'recv');
      break;
    case 'pong':
      // silent
      break;
    case 'error':
      log(`← ERROR: ${msg.message}`, 'err');
      appendSystemMsg('⚠ ' + msg.message);
      break;
    default:
      log(`← ${msg.type}: ${JSON.stringify(msg).slice(0,80)}`, 'recv');
  }
}

// ── Transcript handling (mirrors Kotlin streaming bubbles) ────────────────
function handleTranscript(msg) {
  const text    = (msg.text || '').trim();
  const isUser  = !!msg.is_user;
  const isFinal = msg.is_final !== false; // default true if absent

  if (!text) return;

  if (isUser) {
    if (!isFinal) {
      // Partial: grow user bubble in place
      if (!userStreamingRow) {
        userStreamingRow = appendBubble(text, 'user', true);
      } else {
        userStreamingRow.bubble.textContent = text;
      }
    } else {
      // Final: seal the bubble
      if (userStreamingRow) {
        userStreamingRow.bubble.textContent = text;
        userStreamingRow.bubble.classList.remove('streaming');
        userStreamingRow = null;
      } else {
        appendBubble(text, 'user', false);
      }
      // record turn start for latency calc
      turnStartTime = Date.now();
      firstAudioTime = null;
    }
  } else {
    // AI
    if (!isFinal) {
      // Partial: grow AI bubble in place
      if (!aiStreamingRow) {
        aiStreamingRow = appendBubble(text, 'ai', true);
      } else {
        aiStreamingRow.bubble.textContent = text;
      }
    } else {
      // Final: seal the bubble
      if (aiStreamingRow) {
        aiStreamingRow.bubble.textContent = text;
        aiStreamingRow.bubble.classList.remove('streaming');
        aiStreamingRow = null;
      } else {
        appendBubble(text, 'ai', false);
      }
    }
  }
}

function appendBubble(text, who, streaming) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = `bubble-row ${who}`;
  row.innerHTML = `
    <span class="bubble-label">${who === 'user' ? 'You' : 'AURA'}</span>
    <div class="bubble ${streaming ? 'streaming' : ''}">${escHtml(text)}</div>
    <span class="bubble-time">${ts()}</span>
  `;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return { row, bubble: row.querySelector('.bubble') };
}

function appendSystemMsg(text) {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.style.cssText = 'text-align:center;font-size:11px;color:var(--text-dim);padding:4px';
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

// ── Audio Playback ────────────────────────────────────────────────────────
function handleAudioResponse(b64) {
  if (outputMuted) return;

  // Latency tracking
  chunksRecv++;
  updateMetrics();
  if (turnStartTime && !firstAudioTime) {
    firstAudioTime = Date.now();
    const latency = ((firstAudioTime - turnStartTime) / 1000).toFixed(2);
    document.getElementById('m-latency').textContent = latency;
    log(`⚡ First-audio latency: ${latency}s`, 'info');
  }

  const ctx = getAudioCtx();
  // decode base64 PCM int16
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

  // Create AudioBuffer and schedule gapless playback
  const buf = ctx.createBuffer(1, float32.length, 16000);
  buf.copyToChannel(float32, 0);

  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);

  const now = ctx.currentTime;
  if (nextPlayTime < now) nextPlayTime = now + 0.02; // small gap to avoid glitch
  src.start(nextPlayTime);
  nextPlayTime += buf.duration;

  activeSources.push(src);
  src.onended = () => { activeSources = activeSources.filter(s => s !== src); };

  // Output level indicator (peak of chunk)
  let peak = 0;
  for (let i = 0; i < float32.length; i++) peak = Math.max(peak, Math.abs(float32[i]));
  document.getElementById('out-level').style.width = Math.min(100, peak * 200) + '%';
}

function handleInterrupted() {
  interrupts++;
  updateMetrics();
  // Stop all scheduled audio sources
  activeSources.forEach(s => { try { s.stop(); } catch {} });
  activeSources = [];
  nextPlayTime = 0;
  // Clear any streaming AI bubble
  if (aiStreamingRow) {
    aiStreamingRow.row.remove();
    aiStreamingRow = null;
  }
  // Flash banner
  const banner = document.getElementById('interrupt-banner');
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 1500);
}

function handleTaskProgress(status) {
  const dot   = document.getElementById('task-dot');
  const label = document.getElementById('task-label');
  dot.className = `task-dot ${status}`;
  label.textContent = status === 'executing' ? '⚙ Executing task…' : 'Idle';
}

// ── Microphone ─────────────────────────────────────────────────────────────
async function startMic() {
  const ctx = getAudioCtx();
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: { ideal: 16000 },
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      }
    });
    micSource = ctx.createMediaStreamSource(micStream);

    // ScriptProcessorNode for raw PCM access
    const BUFFER_SIZE = 2048;
    micProcessor = ctx.createScriptProcessor(BUFFER_SIZE, 1, 1);
    micProcessor.onaudioprocess = onMicProcess;
    micSource.connect(micProcessor);
    micProcessor.connect(ctx.destination); // must connect to destination to fire

    document.getElementById('mic-btn').textContent = '🎤 Mic: ON';
    document.getElementById('mic-btn').classList.add('active');
    log('Microphone started', 'info');
    turnStartTime = Date.now();
    return true;
  } catch (e) {
    log(`Mic error: ${e.message}`, 'err');
    return false;
  }
}

function stopMic() {
  if (micProcessor) { micProcessor.disconnect(); micProcessor.onaudioprocess = null; micProcessor = null; }
  if (micSource) { micSource.disconnect(); micSource = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  document.getElementById('mic-btn').textContent = '🎤 Mic: OFF';
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('in-level').style.width = '0%';
  log('Microphone stopped', 'info');
}

function onMicProcess(e) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const float32 = e.inputBuffer.getChannelData(0);

  // Resample if needed (ctx may not be exactly 16kHz)
  let samples = float32;
  if (audioCtx && audioCtx.sampleRate !== 16000) {
    const ratio = audioCtx.sampleRate / 16000;
    const outLen = Math.floor(float32.length / ratio);
    samples = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
      samples[i] = float32[Math.floor(i * ratio)];
    }
  }

  // Level indicator
  let sum = 0;
  for (let i = 0; i < samples.length; i++) sum += samples[i] * samples[i];
  const rms = Math.sqrt(sum / samples.length);
  document.getElementById('in-level').style.width = Math.min(100, rms * 400) + '%';

  // Convert float32 → int16
  const int16 = new Int16Array(samples.length);
  for (let i = 0; i < samples.length; i++) {
    int16[i] = Math.max(-32768, Math.min(32767, Math.round(samples[i] * 32767)));
  }

  // Base64 encode
  const bytes = new Uint8Array(int16.buffer);
  let b64 = '';
  for (let i = 0; i < bytes.length; i++) b64 += String.fromCharCode(bytes[i]);
  const encoded = btoa(b64);

  ws.send(JSON.stringify({ type: 'audio_chunk', data: encoded }));
  chunksSent++;
  if (chunksSent % 20 === 0) updateMetrics(); // throttle DOM update

  // Update waveform
  drawWaveform(samples);
}

// ── Waveform visualizer ───────────────────────────────────────────────────
const canvas = document.getElementById('waveform');
const wCtx = canvas.getContext('2d');
function drawWaveform(samples) {
  const w = canvas.width, h = canvas.height;
  wCtx.fillStyle = '#1a1a1a';
  wCtx.fillRect(0, 0, w, h);
  wCtx.strokeStyle = '#3ecf72';
  wCtx.lineWidth = 1;
  wCtx.beginPath();
  const step = Math.max(1, Math.floor(samples.length / w));
  for (let x = 0; x < w; x++) {
    const s = samples[x * step] || 0;
    const y = (1 - s) * h / 2;
    x === 0 ? wCtx.moveTo(x, y) : wCtx.lineTo(x, y);
  }
  wCtx.stroke();
}

// ── Camera / Screenshot ───────────────────────────────────────────────────
async function startCamera() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const video = document.getElementById('cam-video');
    video.srcObject = camStream;
    await video.play();
    // Send screenshot every 3 seconds
    camTimer = setInterval(sendScreenshot, 3000);
    document.getElementById('cam-btn').textContent = '📷 Camera: ON';
    document.getElementById('cam-btn').classList.add('active');
    log('Camera started — sending screenshots every 3s', 'info');
  } catch (e) {
    log(`Camera error: ${e.message}`, 'err');
  }
}

function stopCamera() {
  clearInterval(camTimer); camTimer = null;
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  const video = document.getElementById('cam-video');
  video.srcObject = null;
  document.getElementById('cam-btn').textContent = '📷 Camera: OFF';
  document.getElementById('cam-btn').classList.remove('active');
  log('Camera stopped', 'info');
}

function sendScreenshot() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const video = document.getElementById('cam-video');
  if (!video.videoWidth) return;
  const c = document.getElementById('cam-canvas');
  c.width  = Math.min(video.videoWidth, 640);
  c.height = Math.round(video.videoHeight * c.width / video.videoWidth);
  c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
  const b64 = c.toDataURL('image/jpeg', 0.7).split(',')[1];
  ws.send(JSON.stringify({ type: 'screenshot', data: b64 }));
  log('→ screenshot sent', 'send');
}

// ── Text command ─────────────────────────────────────────────────────────
function sendText() {
  const inp = document.getElementById('text-input');
  const text = inp.value.trim();
  if (!text || !ws) return;
  send({ type: 'text_command', text });
  appendBubble(text, 'user', false);
  inp.value = '';
  turnStartTime = Date.now();
  firstAudioTime = null;
}

// ── Button wiring ─────────────────────────────────────────────────────────
document.getElementById('connect-btn').onclick = connect;
document.getElementById('disconnect-btn').onclick = disconnect;
document.getElementById('clear-chat-btn').onclick = () => {
  document.getElementById('chat').innerHTML = '';
  userStreamingRow = aiStreamingRow = null;
};
document.getElementById('log-clear-btn').onclick = () => {
  document.getElementById('debug-log').innerHTML = '';
};

document.getElementById('mic-btn').onclick = async () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    log('Connect first before enabling microphone', 'err'); return;
  }
  if (micStream) stopMic();
  else await startMic();
};

document.getElementById('mute-out-btn').onclick = () => {
  outputMuted = !outputMuted;
  document.getElementById('mute-out-btn').textContent = outputMuted ? '🔇 Output: OFF' : '🔊 Output: ON';
  document.getElementById('mute-out-btn').classList.toggle('active', outputMuted);
  log(`Output audio ${outputMuted ? 'muted' : 'unmuted'}`, 'info');
};

document.getElementById('cam-btn').onclick = () => {
  if (camStream) stopCamera();
  else startCamera();
};

document.getElementById('send-btn').onclick = sendText;
document.getElementById('text-input').onkeydown = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
};

// ── Init message ───────────────────────────────────────────────────────────
log('AURA Gemini Live test interface ready', 'info');
log('Click Connect, then enable Mic to start talking', 'info');
</script>
